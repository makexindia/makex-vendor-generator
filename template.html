<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__BUSINESS_NAME__ | Makex Platform</title>

    <meta name="description" content="__DESCRIPTION__">
    
    <meta property="og:type" content="business.business">
    <meta property="og:title" content="__BUSINESS_NAME__">
    <meta property="og:description" content="__SOCIAL_DESCRIPTION__">
    <meta property="og:image" content="https://vendor.makex.in/makex.in/op-image.jpg">
    <meta property="og:url" content="__VANITY_URL__">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="__VANITY_URL__">

    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="/makex.in/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/makex.in/site.webmanifest">

    __LOCAL_BUSINESS_SCHEMA__

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { light: '__THEME_LIGHT__', DEFAULT: '__THEME_PRIMARY__', dark: '__THEME_DARK__', accent: '__THEME_ACCENT__' } } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen pb-24">

    <nav class="bg-brand-light shadow-md fixed w-full z-10 top-0">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center space-x-3">
                    __LOGO_HTML__
                    <div>
                        <h1 class="text-xl font-bold text-brand-dark leading-tight">__BUSINESS_NAME__</h1>
                        <p class="text-xs text-brand-DEFAULT text-white drop-shadow-sm font-semibold">Powered by Makex</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-28 max-w-7xl mx-auto px-4 w-full">
        <div class="mb-8 text-center max-w-2xl mx-auto">
            <p class="text-gray-600">__DESCRIPTION__</p>
        </div>
        <div id="catalog-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="floating-cart" class="fixed bottom-0 w-full bg-brand-dark text-white p-4 shadow-[0_-8px_15px_-3px_rgba(0,0,0,0.2)] transform translate-y-full transition-transform duration-300 z-20 flex justify-between items-center hidden">
        <div>
            <p class="text-sm text-brand-light font-medium opacity-90">Total Order (<span id="cart-items-count">0</span> items)</p>
            <p class="text-xl font-bold">__CURRENCY__<span id="cart-total">0</span></p>
        </div>
        <button onclick="sendOrderToWhatsApp()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2.5 rounded-lg font-bold shadow-md transition flex items-center gap-2">
            <i class="fa-brands fa-whatsapp text-xl"></i> Order via WhatsApp
        </button>
    </div>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-gray-600">
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-location-dot text-brand-DEFAULT w-4 text-center"></i>
                    <a href="__GMAPS_LINK__" target="_blank" class="hover:text-brand-dark transition">__FULL_ADDRESS__</a>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-clock text-brand-DEFAULT w-4 text-center"></i>
                    <span>__HOURS__</span>
                </div>
                __CONTACT_HTML__
            </div>
            <div class="flex flex-col items-center md:items-end gap-2">
                __SOCIAL_HTML__
                <div>© 2026 __BUSINESS_NAME__. All rights reserved.</div>
            </div>
        </div>
        __POLICY_LINKS__
    </footer>

    <script>
        // Logic: Modal Handling
        function openPolicyModal(id) {
            const modal = document.getElementById(`modal-${id}`);
            if(modal) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modal.querySelector('div').classList.remove('scale-95');
                }, 10);
            }
        }

        function closePolicyModal(id) {
            const modal = document.getElementById(`modal-${id}`);
            if(modal) {
                modal.classList.add('opacity-0');
                modal.querySelector('div').classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        let catalogData = [];
        let cart = {}; // Tracks quantities: { "item-001": 2, "item-002": 1 }

        async function loadCatalog() {
            try {
                const response = await fetch('catalog.json');
                catalogData = await response.json();
                renderCatalog();
            } catch (error) { 
                console.error("Failed to load catalog", error); 
            }
        }

        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = catalogData.map(item => `
                <div id="product-card-${item.id}" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex gap-4 hover:shadow-md transition duration-300 relative overflow-hidden">
                    <img src="${item.image}" onerror="this.onerror=null; this.src='https://placehold.co/400x400/eeeeee/999999?text=No+Image';" class="w-24 h-24 object-cover rounded-lg bg-gray-50 border border-gray-100">
                    <div class="flex flex-col justify-between flex-1">
                        <div>
                            <div class="flex justify-between items-start gap-2">
                                <h3 class="font-bold text-gray-800 leading-tight">${item.name}</h3>
                                ${item.inStock === false ? '<span class="flex-shrink-0 px-2 py-0.5 bg-yellow-100 text-yellow-800 text-[10px] uppercase font-bold rounded whitespace-nowrap">Out of Stock</span>' : ''}
                            </div>
                            <p class="text-brand-dark font-bold text-lg mt-1">__CURRENCY__${item.price}</p>
                        </div>
                        <div id="control-${item.id}" class="mt-2 h-9 flex items-end">
                            </div>
                    </div>
                </div>
            `).join('');

            // Initialize UI for all items
            catalogData.forEach(item => updateItemUI(item.id));

            if (window.__TARGET_ITEM_ID__) {
                const targetCard = document.getElementById(`product-card-${window.__TARGET_ITEM_ID__}`);
                if (targetCard) {
                    targetCard.classList.add('ring-4', 'ring-brand-DEFAULT', 'ring-opacity-50', 'transform', 'scale-[1.02]');
                    setTimeout(() => targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
                }
            }
        }

        // Logic: Add or Subtract quantity
        function updateCart(itemId, change) {
            if (!cart[itemId]) cart[itemId] = 0;
            cart[itemId] += change;
            if (cart[itemId] < 0) cart[itemId] = 0; // Prevent negative quantities
            
            updateItemUI(itemId);
            updateCartUI();
        }

        // Logic: Render the specific Add / +/- button state
        function updateItemUI(itemId) {
            const container = document.getElementById(`control-${itemId}`);
            if (!container) return;

            const qty = cart[itemId] || 0;

            if (qty === 0) {
                // Show standard "Add" button
                container.innerHTML = `
                    <button onclick="updateCart('${itemId}', 1)" class="bg-white border border-brand-DEFAULT text-brand-dark px-4 py-1.5 rounded-md hover:bg-brand-light hover:text-brand-dark text-sm font-bold transition w-full shadow-sm">
                        ADD
                    </button>
                `;
            } else {
                // Show " - | QTY | + " controller
                container.innerHTML = `
                    <div class="flex items-center justify-between w-full bg-brand-light rounded-md overflow-hidden border border-brand-DEFAULT shadow-sm">
                        <button onclick="updateCart('${itemId}', -1)" class="w-10 h-8 text-brand-dark hover:bg-white transition font-bold text-lg flex items-center justify-center">−</button>
                        <span class="font-bold text-brand-dark text-sm">${qty}</span>
                        <button onclick="updateCart('${itemId}', 1)" class="w-10 h-8 text-brand-dark hover:bg-white transition font-bold text-lg flex items-center justify-center">+</button>
                    </div>
                `;
            }
        }

        // Logic: Update bottom floating bar
        function updateCartUI() {
            let total = 0;
            let totalItems = 0;

            for (const [id, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const item = catalogData.find(i => i.id === id);
                    if (item) {
                        if (item.inStock !== false) {
                            total += item.price * qty;
                        }
                        totalItems += qty;
                    }
                }
            }

            const cartBar = document.getElementById('floating-cart');
            document.getElementById('cart-total').innerText = total;
            document.getElementById('cart-items-count').innerText = totalItems;

            if (totalItems > 0) {
                cartBar.classList.remove('hidden');
                // Small delay to allow display:block to apply before animating transform
                setTimeout(() => cartBar.classList.remove('translate-y-full'), 10);
            } else {
                cartBar.classList.add('translate-y-full');
                setTimeout(() => cartBar.classList.add('hidden'), 300);
            }
        }

        // Logic: Compile order and redirect to WhatsApp
        function sendOrderToWhatsApp() {
            let availableText = "*Available Items*\n";
            let backorderText = "\n*Interest / Backorder*\n";
            let hasAvailable = false;
            let hasBackorder = false;
            let total = 0;

            for (const [id, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const item = catalogData.find(i => i.id === id);
                    if (item) {
                        if (item.inStock !== false) {
                            availableText += `▪ ${qty}x ${item.name} - __CURRENCY__${item.price * qty}\n`;
                            total += item.price * qty;
                            hasAvailable = true;
                        } else {
                            backorderText += `▪ ${qty}x ${item.name}\n`;
                            hasBackorder = true;
                        }
                    }
                }
            }
            
            let orderText = "__WHATSAPP_MSG__\n\n";
            if (hasAvailable) {
                orderText += availableText + `\n*Total: __CURRENCY__${total}*\n`;
            }
            if (hasBackorder) {
                orderText += backorderText;
            }
            
            const whatsappUrl = `https://wa.me/__WHATSAPP_CLEAN__?text=${encodeURIComponent(orderText.trim())}`;
            window.open(whatsappUrl, '_blank');
        }

        document.addEventListener('DOMContentLoaded', loadCatalog);
    </script>
    __POLICY_MODALS__
</body>
</html>
